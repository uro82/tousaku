<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

#text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 40px;
  font-weight: bold;
  font-family: monospace;
  opacity: 0;
  letter-spacing: 5px;
}

/* グリッチ風 */
.glitch {
  animation: glitch 0.1s infinite;
}

@keyframes glitch {
  0% { transform: translate(-50%, -50%) translate(1px, 0); }
  25% { transform: translate(-50%, -50%) translate(-1px, 1px); }
  50% { transform: translate(-50%, -50%) translate(1px, -1px); }
  75% { transform: translate(-50%, -50%) translate(-1px, 0); }
  100% { transform: translate(-50%, -50%) translate(1px, 1px); }
}
</style>
</head>

<body>

<div id="text">盗作</div>

<script>
const text = document.getElementById("text");

let count = 0;

function flicker() {
  if (count > 6) {
    // 最後はしっかり表示
    text.style.opacity = 1;
    text.classList.remove("glitch");
    return;
  }

  text.style.opacity = Math.random() > 0.5 ? 1 : 0;
  text.classList.add("glitch");

  count++;
  setTimeout(flicker, 150);
}

// 少し間を置いてから開始
setTimeout(flicker, 500);
</script>

</body>
</html>
