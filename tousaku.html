<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* パーツ */
.part {
  position: absolute;
  color: white;
  font-size: 36px;
  font-family: monospace;
  opacity: 0;
  transition: all 0.8s ease;
}

/* 完成文字 */
#final {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scaleX(1);
  color: white;
  font-size: 50px;
  font-weight: bold;
  opacity: 0;
}

/* グリッチ */
.glitch {
  animation: glitchX 0.15s;
}

@keyframes glitchX {
  0%   { transform: translate(-50%, -50%) scaleX(1.3); }
  50%  { transform: translate(-50%, -50%) scaleX(0.7); }
  100% { transform: translate(-50%, -50%) scaleX(1); }
}
</style>
</head>

<body>

<div id="final">盗作</div>

<script>
const fragments = [
  "亻","欠","丶","次","貝","乍","刂","一","ノ","丶","フ","口"
];

const parts = [];

// パーツ生成
for (let i = 0; i < 20; i++) {
  const el = document.createElement("div");
  el.className = "part";
  el.innerText = fragments[Math.floor(Math.random() * fragments.length)];

  document.body.appendChild(el);
  parts.push(el);

  // ランダム位置（画面全体）
  const x = Math.random() * 100;
  const y = Math.random() * 100;

  el.style.left = x + "%";
  el.style.top = y + "%";

  // 少し遅れて出現
  setTimeout(() => {
    el.style.opacity = 1;
  }, Math.random() * 500);

  // 中央へ収束
  setTimeout(() => {
    el.style.left = "50%";
    el.style.top = "50%";
    el.style.transform = "translate(-50%, -50%)";
  }, 500 + Math.random() * 500);
}

// 合体
setTimeout(() => {
  parts.forEach(p => p.style.opacity = 0);

  const final = document.getElementById("final");
  final.style.opacity = 1;

  // グリッチ
  final.classList.add("glitch");
}, 1400);
</script>

</body>
</html>
